<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Listings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at top left, rgba(102, 126, 234, 0.18), transparent 35%),
                        radial-gradient(circle at bottom right, rgba(56, 189, 248, 0.14), transparent 30%),
                        #eef2ff;
        }
        .job-card {
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
            border: none;
            background: #ffffff;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .job-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.12);
        }
        .job-card .card-title {
            color: #1d4ed8;
        }
        .job-card .card-text {
            color: #6b7280;
        }
        .btn-primary {
            background-color: #1d4ed8;
            border-color: #1d4ed8;
        }
        .btn-primary:hover {
            background-color: #1e40af;
            border-color: #1e40af;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="text-center mb-5">
            <h1 class="display-4 fw-bold text-primary">Job Listings</h1>
            <p class="lead text-muted">Discover your next opportunity</p>
        </div>
        <div id="jobs-container" class="row g-4">
            <!-- Job cards will be inserted here -->
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const supabaseUrl = 'https://lzjskkakyrhsbjnyjpjm.supabase.co';
        const supabaseKey = 'sb_publishable_4VE4pcQPXJ_46vX1AV6cvA_diURQ8Mi';

        const jobsContainer = document.getElementById('jobs-container');

        jobsContainer.innerHTML = '<div class="col-12"><div class="alert alert-info text-center">Loading jobs...</div></div>';

        fetch(`${supabaseUrl}/rest/v1/jobs?select=*&order=created_at.desc`, {
            headers: {
                'apikey': supabaseKey,
                'Authorization': `Bearer ${supabaseKey}`,
                'Accept': 'application/json'
            }
        })
        .then(res => res.json())
        .then(data => {
            if (!Array.isArray(data) || data.length === 0) {
                jobsContainer.innerHTML = '<div class="col-12"><div class="alert alert-warning text-center">No jobs available at the moment.</div></div>';
                return;
            }

            let html = '';
            data.forEach(job => {
                const titleText = job.title || job.job_title || job.name || job.job_name || job.position || job.role || 'Untitled Job';
                const descriptionText = job.description || 'No description available.';
                const location = job.location || job.city || job.state || 'Location not specified';
                const company = job.company || job.organization || 'Company not specified';

                html += `
                    <div class="col-12 col-md-6 col-lg-4">
                        <div class="card job-card h-100">
                            <div class="card-body d-flex flex-column">
                                <h5 class="card-title">${titleText}</h5>
                                <h6 class="card-subtitle mb-2 text-muted">${company}</h6>
                                <p class="card-text flex-grow-1">${descriptionText.length > 100 ? descriptionText.substring(0, 100) + '...' : descriptionText}</p>
                                <div class="mt-auto">
                                    <small class="text-muted d-block mb-2"><i class="bi bi-geo-alt"></i> ${location}</small>
                                    <a href="job.html?id=${job.id}" class="btn btn-primary btn-sm">View Details</a>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });

            jobsContainer.innerHTML = html;
        })
        .catch(error => {
            console.error('Error fetching jobs:', error);
            jobsContainer.innerHTML = `<div class="col-12"><div class="alert alert-danger text-center">Error loading jobs: ${error.message}</div></div>`;
        });
    </script>
</body>
</html>
